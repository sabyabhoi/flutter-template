name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Static analysis
        run: flutter analyze

      # CI doesn't have real env/*.json files. The example file ships with
      # safe placeholders so unit/widget tests (which override providers
      # rather than calling Supabase) can still build.
      - name: Stage test env file
        run: cp env/example.json env/dev.json

      - name: Test
        run: flutter test --coverage --reporter=compact

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
