name: app
description: "Production-ready Flutter template with Supabase auth, Riverpod, go_router, Material 3, Talker + Sentry, and dev/staging/prod flavors."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.3

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Auth backend
  supabase_flutter: ^2.12.4

  # Networking
  dio: ^5.9.2

  # Local data
  # Pinned to a version whose analyzer constraint matches the codegen toolchain
  # (drift_dev 2.31.x → analyzer >=8.1.0 <11.0.0).
  drift: ">=2.30.0 <2.32.0"
  # 0.6.0 is an EOL no-op for sqlite3 v3.x; we're on drift 2.31.x which
  # depends on sqlite3 ^2.6.0 and still needs the 0.5.x native libs.
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5
  path: ^1.9.0
  # Pinned to <10.0.0: 10+ pulls flutter_secure_storage_windows 4.x which
  # depends on an older win32 incompatible with talker_flutter's transitive
  # share_plus dependency. 9.2.4 works on all platforms we target.
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.5

  # Logging & observability
  # Pinned to <5.1.17: 5.1.17+ bumps share_plus → win32 ^6.0.0, which is
  # incompatible with flutter_secure_storage 9.x's win32 ^5.x dep on Windows.
  talker_flutter: ">=5.1.14 <5.1.17"
  talker_riverpod_logger: ">=5.1.14 <5.1.17"
  talker_dio_logger: ">=5.1.14 <5.1.17"
  sentry_flutter: ^9.19.0
  sentry_dio: ^9.19.0

  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^10.2.0
  # riverpod_lint 3.1.3+ uses the new analysis_server_plugin API directly
  # (no custom_lint dependency), enabled via analyzer.plugins in
  # analysis_options.yaml.
  riverpod_lint: ^3.1.3

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  # Pinned to versions whose analyzer constraints are mutually compatible
  # (analyzer ^9.x — required by riverpod_lint/riverpod_generator/freezed).
  json_serializable: ">=6.13.0 <6.13.2"
  riverpod_generator: ^4.0.3
  drift_dev: ">=2.31.0 <2.32.0"

  # Test utilities
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true
